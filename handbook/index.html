<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inority Handbook</title>
    <style id="markdown-theme"></style>
    <style id="highlight-theme"></style>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-brand">
          <h1>Inority Handbook</h1>
          <p class="topbar-copy">本地 handbook 站，直接读取配置的 Markdown 文档目录。</p>
        </div>

        <div class="topbar-meta">
          <h2 id="doc-title">Inority Handbook</h2>
        </div>

        <div class="topbar-actions">
          <button id="directory-toggle" class="ghost-button icon-button" type="button" aria-label="隐藏目录" data-tooltip="隐藏目录">
            <svg viewBox="0 0 16 16" aria-hidden="true">
              <path d="M1.5 2.5h13v11h-13zM2.5 3.5v9h3v-9zm4 0v9h7v-9z" />
            </svg>
          </button>
          <button id="toc-toggle" class="ghost-button icon-button" type="button" aria-label="隐藏 TOC" data-tooltip="隐藏 TOC">
            <svg viewBox="0 0 16 16" aria-hidden="true">
              <path d="M1.5 2.5h13v11h-13zM2.5 3.5v9h7v-9zm8 0v2h3v-2zm0 3v2h3v-2zm0 3v2h3v-2z" />
            </svg>
          </button>
          <button id="theme-toggle" class="ghost-button icon-button" type="button" aria-label="切换主题" data-tooltip="切换主题">
            <svg class="theme-icon theme-icon-sun" viewBox="0 0 16 16" aria-hidden="true">
              <path d="M8 3.25a.75.75 0 0 1 .75.75v.5a.75.75 0 0 1-1.5 0V4A.75.75 0 0 1 8 3.25Zm0 7a2.25 2.25 0 1 0 0-4.5 2.25 2.25 0 0 0 0 4.5Zm4-2.25A.75.75 0 0 1 12.75 7h.5a.75.75 0 0 1 0 1.5h-.5A.75.75 0 0 1 12 8Zm-8 0A.75.75 0 0 1 4.75 7h.5a.75.75 0 0 1 0 1.5h-.5A.75.75 0 0 1 4 8Zm6.03-3.28a.75.75 0 0 1 1.06 0l.35.36a.75.75 0 1 1-1.06 1.06l-.35-.35a.75.75 0 0 1 0-1.07Zm-5.47 5.47a.75.75 0 0 1 1.06 0l.35.35a.75.75 0 0 1-1.06 1.06l-.35-.35a.75.75 0 0 1 0-1.06Zm6.53 1.41a.75.75 0 0 1 0 1.06l-.35.35a.75.75 0 1 1-1.06-1.06l.35-.35a.75.75 0 0 1 1.06 0Zm-5.47-5.47a.75.75 0 0 1 0 1.06l-.35.35A.75.75 0 1 1 4.22 6.6l.35-.35a.75.75 0 0 1 1.06 0ZM8 11.5a.75.75 0 0 1 .75.75v.5a.75.75 0 0 1-1.5 0v-.5A.75.75 0 0 1 8 11.5Z" />
            </svg>
            <svg class="theme-icon theme-icon-moon" viewBox="0 0 16 16" aria-hidden="true">
              <path d="M9.92 2.56a.75.75 0 0 1 .3.98 4.75 4.75 0 0 0 6.04 6.04.75.75 0 0 1 .98.3.75.75 0 0 1-.12.83A6.5 6.5 0 1 1 9.09 2.68a.75.75 0 0 1 .83-.12Z" />
            </svg>
          </button>
          <button id="copy-link" class="ghost-button icon-button" type="button" aria-label="复制链接" data-tooltip="复制链接">
            <svg viewBox="0 0 16 16" aria-hidden="true">
              <path d="M6.25 4A2.25 2.25 0 0 1 8.5 1.75h2A2.25 2.25 0 0 1 12.75 4v2a2.25 2.25 0 0 1-2.25 2.25h-2A2.25 2.25 0 0 1 6.25 6V4Zm1.5 0v2c0 .41.34.75.75.75h2a.75.75 0 0 0 .75-.75V4a.75.75 0 0 0-.75-.75h-2a.75.75 0 0 0-.75.75ZM3.25 7.5A2.25 2.25 0 0 1 5.5 5.25h1a.75.75 0 0 1 0 1.5h-1a.75.75 0 0 0-.75.75v2a.75.75 0 0 0 .75.75h2a.75.75 0 0 0 .75-.75v-1a.75.75 0 0 1 1.5 0v1a2.25 2.25 0 0 1-2.25 2.25h-2A2.25 2.25 0 0 1 3.25 9.5v-2Z" />
            </svg>
          </button>
        </div>
      </header>

      <main class="workspace-grid">
        <aside class="sidebar-left">
          <section class="panel panel-quick-access">
            <div class="panel-header">
              <h3>Quick Access</h3>
              <p>最近访问的 5 个文件</p>
            </div>

            <nav id="quick-access" class="quick-access" aria-label="最近访问文件">
              <div class="empty-state">最近访问的文件会出现在这里。</div>
            </nav>
          </section>

          <section class="panel panel-directory">
            <div class="panel-header">
              <h3>Directory</h3>
              <p>当前文档根目录</p>
            </div>

            <label class="search">
              <span>筛选</span>
              <input id="tree-search" type="search" placeholder="文件名 / 目录名" />
            </label>

            <div id="tree-shell" class="tree-shell" data-scroll-top-hint="false" data-scroll-bottom-hint="false">
              <div class="tree-scroll-hint tree-scroll-hint-top" aria-hidden="true"></div>
              <nav id="tree" class="tree" aria-label="文档目录"></nav>
              <div class="tree-scroll-hint tree-scroll-hint-bottom" aria-hidden="true"></div>
            </div>
          </section>
        </aside>

        <section class="panel panel-document">
          <div class="panel-header">
            <div class="panel-header-main">
              <h3>Content</h3>
              <p id="breadcrumb" class="breadcrumb">docs</p>
            </div>
            <p>Markdown viewer</p>
          </div>

          <div class="preview-frame">
            <article id="preview" class="markdown-body preview-body"></article>
          </div>
        </section>

        <aside class="panel panel-toc">
          <div class="panel-header">
            <h3>TOC</h3>
            <p>标题导航</p>
          </div>

          <nav id="toc" class="toc" aria-label="文档目录索引">
            <div class="empty-state">等待文档加载。</div>
          </nav>
        </aside>
      </main>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
